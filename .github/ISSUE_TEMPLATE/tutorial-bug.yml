name: Tutorial bug / 教程问题
description: Report a course interaction, animation, layout, localization or result defect.
title: "[Tutorial] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing AlgoLatch. Do not include private source code, API keys or exploitable security details. Security issues must use private vulnerability reporting.

  - type: input
    id: course
    attributes:
      label: Course number and title / 课程编号与名称
      placeholder: "Course 63 — Binary search"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AlgoLatch version / 版本
      placeholder: "v0.1.1-preview.1"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Operating system / 操作系统
      options:
        - macOS — Apple Silicon
        - macOS — Intel
        - Windows 11 x64
        - Windows 10 x64
        - Other / 其他
    validations:
      required: true

  - type: input
    id: display
    attributes:
      label: Window size and display scale / 窗口大小与显示缩放
      placeholder: "1280×800 window, 150% scale"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps / 复现步骤
      placeholder: |
        1. Open Tutorials
        2. Select Course ...
        3. Enter ...
        4. Click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result / 预期结果
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Observed result / 实际结果
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Screenshot or recording / 截图或录屏
      description: Remove personal paths, source code and credentials before uploading.

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation / 隐私确认
      options:
        - label: I removed private source code, API keys and sensitive paths from this report.
          required: true
