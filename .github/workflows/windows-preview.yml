name: Publish unsigned cross-platform preview

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cross-platform-preview-v0.0.2-preview.2
  cancel-in-progress: false

env:
  PREVIEW_TAG: v0.0.2-preview.2

jobs:
  build_macos:
    name: Build and verify unsigned macOS Universal preview
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - name: Check out main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Require main branch
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF}" == "refs/heads/main" ]]

      - name: Set up Node 24 LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: Pin npm
        run: npm install --global npm@11.11.0

      - name: Install locked dependencies
        run: npm ci

      - name: Check release boundary, notices, formatting and types
        run: |
          npm run accept:m9
          npm run notices:check
          npm run format:check
          npm run typecheck

      - name: Run unit, integration and architecture tests
        run: npm test

      - name: Build ad-hoc-signed macOS Universal preview
        run: npm run dist:mac:beta

      - name: Run changed canvas Electron regression
        run: npx playwright test tests/e2e/flow-canvas-readability.spec.ts

      - name: Install, launch and verify the macOS preview
        run: npm run verify:installed-dmg:beta

      - name: Create macOS SHA-256 manifest
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-beta/*.dmg)
          [[ "${#files[@]}" -eq 1 ]]
          (cd release-beta && shasum -a 256 "$(basename "${files[0]}")" > SHA256SUMS-macos.txt)
          (cd release-beta && shasum -a 256 --check SHA256SUMS-macos.txt)

      - name: Upload verified macOS artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: algolatch-macos-preview
          path: |
            release-beta/*.dmg
            release-beta/SHA256SUMS-macos.txt
          if-no-files-found: error

  build_windows:
    name: Build and verify unsigned Windows x64 preview
    runs-on: windows-2025
    timeout-minutes: 120
    steps:
      - name: Check out main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Require main branch
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF}" == "refs/heads/main" ]]

      - name: Set up Node 24 LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: Pin npm
        run: npm install --global npm@11.11.0

      - name: Install locked dependencies
        run: npm ci

      - name: Check release boundary, notices, formatting and types
        run: |
          npm run accept:m9
          npm run notices:check
          npm run format:check
          npm run typecheck

      - name: Test Windows packaging and runner contracts
        run: >-
          npx vitest run
          tests/scripts/windows-toolchain.test.mjs
          tests/scripts/installed-windows-gate.test.mjs
          tests/config/windows-packaging.test.ts
          tests/runner/process-host.test.ts

      - name: Build unsigned Windows x64 installer
        run: npm run dist:win:beta

      - name: Install, launch, exercise and uninstall the Windows preview
        run: npm run verify:installed-win:beta

      - name: Create Windows SHA-256 manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(Get-ChildItem -LiteralPath 'release-windows-beta' -Filter '*.exe' -File)
          if ($files.Count -ne 1) {
            throw "Expected exactly one EXE in release-windows-beta/."
          }
          $hash = (Get-FileHash -LiteralPath $files[0].FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $manifest = Join-Path $files[0].DirectoryName 'SHA256SUMS-windows.txt'
          [System.IO.File]::WriteAllText($manifest, "$hash  $($files[0].Name)`n", [System.Text.Encoding]::ASCII)

      - name: Upload verified Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: algolatch-windows-preview
          path: |
            release-windows-beta/*.exe
            release-windows-beta/SHA256SUMS-windows.txt
          if-no-files-found: error

  publish_preview:
    name: Publish verified macOS and Windows preview release
    needs: [build_macos, build_windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out release notes
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Download verified macOS artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: algolatch-macos-preview
          path: release-assets/macos

      - name: Download verified Windows artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: algolatch-windows-preview
          path: release-assets/windows

      - name: Verify platform artifacts and create public SHA-256 manifest
        shell: bash
        run: |
          set -euo pipefail
          (cd release-assets/macos && shasum -a 256 --check SHA256SUMS-macos.txt)
          (cd release-assets/windows && sha256sum --check SHA256SUMS-windows.txt)
          mkdir -p release-assets/publish
          cp release-assets/macos/*.dmg release-assets/publish/
          cp release-assets/windows/*.exe release-assets/publish/
          cd release-assets/publish
          sha256sum ./*.dmg ./*.exe > SHA256SUMS.txt
          sha256sum --check SHA256SUMS.txt

      - name: Publish immutable cross-platform prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${PREVIEW_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${PREVIEW_TAG} already exists; refusing to overwrite it." >&2
            exit 1
          fi
          gh release create "${PREVIEW_TAG}" \
            release-assets/publish/*.dmg \
            release-assets/publish/*.exe \
            release-assets/publish/SHA256SUMS.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --prerelease \
            --title "AlgoLatch ${PREVIEW_TAG} for macOS and Windows (unsigned preview)" \
            --notes-file "docs/releases/${PREVIEW_TAG}.md"
