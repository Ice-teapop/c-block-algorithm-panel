name: Release unsigned macOS beta

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-beta:
    name: Verify and publish Universal DMG
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Set up Node 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Pin npm
        run: npm install --global npm@11.11.0

      - name: Install locked dependencies
        run: npm ci

      - name: Validate tag and unsigned beta boundary
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run accept:m9

      - name: Check formatting
        run: npm run format:check

      - name: Run unit, integration, and architecture tests
        run: npm test

      - name: Enforce M0-M5 gold, equivalence, and fuzz gates
        run: npm run accept:m0-m5-regression

      - name: Enforce M6 workbench gates
        run: npm run accept:m6

      - name: Enforce M7 runtime gates
        run: npm run accept:m7

      - name: Enforce M8 learning gates
        run: npm run accept:m8

      - name: Run Electron end-to-end regression
        id: electron_e2e
        run: npm run test:e2e

      - name: Upload Electron failure traces
        if: failure() && steps.electron_e2e.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: electron-e2e-failure-${{ github.ref_name }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/c-block-algorithm-panel-playwright
          if-no-files-found: ignore
          retention-days: 7

      - name: Build unsigned Universal beta DMG
        run: npm run dist:mac:beta

      - name: Verify copied installed application from DMG
        run: npm run verify:installed-dmg

      - name: Create SHA-256 manifest
        shell: bash
        run: |
          set -euo pipefail
          cd release
          dmg_files=(*.dmg)
          if [[ ! -e "${dmg_files[0]}" || "${#dmg_files[@]}" -ne 1 ]]; then
            echo "Expected exactly one DMG in release/." >&2
            exit 1
          fi
          shasum -a 256 "${dmg_files[@]}" > SHA256SUMS.txt
          shasum -a 256 --check SHA256SUMS.txt

      - name: Upload verified build artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-block-algorithm-panel-${{ github.ref_name }}-macos-universal
          path: |
            release/*.dmg
            release/SHA256SUMS.txt
          if-no-files-found: error

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --prerelease \
              --title "C Block Algorithm Panel ${GITHUB_REF_NAME}"
            gh release upload "${GITHUB_REF_NAME}" \
              release/*.dmg \
              release/SHA256SUMS.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              release/*.dmg \
              release/SHA256SUMS.txt \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --prerelease \
              --title "C Block Algorithm Panel ${GITHUB_REF_NAME}" \
              --notes "Unsigned and unnotarized macOS beta for testing. Verify SHA256SUMS.txt before opening. Gatekeeper may require explicit user approval."
          fi
