name: Release signed Windows build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify_windows:
    name: Verify signed Windows x64 installer
    runs-on: windows-2025
    environment: windows-release
    timeout-minutes: 120
    steps:
      - name: Check out tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Require the tagged commit on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "${GITHUB_SHA}" refs/remotes/origin/main

      - name: Set up Node 24 LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: Pin npm
        run: npm install --global npm@11.11.0

      - name: Install locked dependencies
        run: npm ci

      - name: Validate tag and Windows release boundary
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run accept:m9

      - name: Verify third-party notices
        run: npm run notices:check

      - name: Check formatting
        run: npm run format:check

      - name: Type-check Windows code paths
        run: npm run typecheck

      - name: Test Windows toolchain, packaging, runner and install contracts
        run: >-
          npx vitest run
          tests/scripts/windows-toolchain.test.mjs
          tests/scripts/windows-release-credentials.test.mjs
          tests/scripts/installed-windows-gate.test.mjs
          tests/config/app-icon.test.ts
          tests/config/windows-packaging.test.ts
          tests/runner/process-host.test.ts
          tests/runner/trace-session.test.ts
          tests/app/runtime-workspace-controller.test.ts

      - name: Test the Windows Job Object runner contract
        run: >-
          npx vitest run tests/runner/runner.test.ts
          -t "uses the bundled Windows compiler through the Job Object host"

      - name: Build Authenticode-signed Windows x64 installer
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm run dist:win

      - name: Verify Authenticode and installed application
        run: npm run verify:installed-win

      - name: Create Windows SHA-256 manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(Get-ChildItem -LiteralPath 'release-windows' -Filter '*.exe' -File)
          if ($files.Count -ne 1) {
            throw "Expected exactly one EXE in release-windows/."
          }
          $hash = (Get-FileHash -LiteralPath $files[0].FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $manifest = Join-Path $files[0].DirectoryName 'SHA256SUMS-windows.txt'
          [System.IO.File]::WriteAllText($manifest, "$hash  $($files[0].Name)`n", [System.Text.Encoding]::ASCII)
          $recorded = (Get-Content -LiteralPath $manifest -Raw).Trim().Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries)[0]
          if ($recorded -ne $hash) {
            throw 'Windows SHA-256 manifest verification failed.'
          }

      - name: Upload verified Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: algolatch-${{ github.ref_name }}-windows-x64
          path: |
            release-windows/*.exe
            release-windows/SHA256SUMS-windows.txt
          if-no-files-found: error

  publish_windows:
    name: Publish verified Windows GitHub Release
    needs: [verify_windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out tagged release notes
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Download verified Windows artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: algolatch-${{ github.ref_name }}-windows-x64
          path: release-assets/windows

      - name: Verify Windows artifact and create public SHA-256 manifest
        shell: bash
        run: |
          set -euo pipefail
          (cd release-assets/windows && sha256sum --check SHA256SUMS-windows.txt)
          mkdir -p release-assets/publish
          cp release-assets/windows/*.exe release-assets/publish/
          cd release-assets/publish
          sha256sum ./*.exe > SHA256SUMS.txt
          sha256sum --check SHA256SUMS.txt

      - name: Create immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          notes_file="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ ! -f "${notes_file}" ]]; then
            echo "Missing release notes: ${notes_file}" >&2
            exit 1
          fi
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; published metadata and assets are immutable." >&2
            exit 1
          fi
          gh release create "${GITHUB_REF_NAME}" \
            release-assets/publish/*.exe \
            release-assets/publish/SHA256SUMS.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --latest \
            --title "AlgoLatch ${GITHUB_REF_NAME} for Windows" \
            --notes-file "${notes_file}"
