name: Release signed and notarized macOS build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify and publish Universal DMG
    runs-on: macos-15
    environment: macos-release
    timeout-minutes: 90
    steps:
      - name: Check out tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Require the tagged commit on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "${GITHUB_SHA}" refs/remotes/origin/main

      - name: Set up Node 24 LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: Pin npm
        run: npm install --global npm@11.11.0

      - name: Install locked dependencies
        run: npm ci

      - name: Validate tag and signed release boundary
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run accept:m9

      - name: Verify third-party notices
        run: npm run notices:check

      - name: Check formatting
        run: npm run format:check

      - name: Run unit, integration, and architecture tests
        run: npm test

      - name: Enforce M0-M5 gold, equivalence, and fuzz gates
        run: npm run accept:m0-m5-regression

      - name: Enforce M6 workbench gates
        run: npm run accept:m6

      - name: Enforce M7 runtime gates
        run: npm run accept:m7

      - name: Enforce M8 learning gates
        run: npm run accept:m8

      - name: Run Electron end-to-end regression
        id: electron_e2e
        run: npm run test:e2e

      - name: Upload Electron failure traces
        if: failure() && steps.electron_e2e.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: electron-e2e-failure-${{ github.ref_name }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/c-block-algorithm-panel-playwright
          if-no-files-found: ignore
          retention-days: 7

      - name: Prepare notarization API key
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          : "${APPLE_API_KEY_P8_BASE64:?Missing APPLE_API_KEY_P8_BASE64 secret}"
          umask 077
          printf '%s' "${APPLE_API_KEY_P8_BASE64}" | /usr/bin/base64 -D > "${RUNNER_TEMP}/AuthKey.p8"

      - name: Build signed and notarized Universal DMG
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm run dist:mac

      - name: Remove temporary notarization key
        if: always()
        shell: bash
        run: rm -f "${RUNNER_TEMP}/AuthKey.p8"

      - name: Verify Developer ID, notarization and installed application
        run: npm run verify:installed-dmg

      - name: Create SHA-256 manifest
        shell: bash
        run: |
          set -euo pipefail
          cd release
          dmg_files=(*.dmg)
          if [[ ! -e "${dmg_files[0]}" || "${#dmg_files[@]}" -ne 1 ]]; then
            echo "Expected exactly one DMG in release/." >&2
            exit 1
          fi
          shasum -a 256 "${dmg_files[@]}" > SHA256SUMS.txt
          shasum -a 256 --check SHA256SUMS.txt

      - name: Upload verified build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: algolatch-${{ github.ref_name }}-macos-universal
          path: |
            release/*.dmg
            release/SHA256SUMS.txt
          if-no-files-found: error

  publish:
    name: Publish verified GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out tagged release notes
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Download verified build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: algolatch-${{ github.ref_name }}-macos-universal
          path: release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          notes_file="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ ! -f "${notes_file}" ]]; then
            echo "Missing release notes: ${notes_file}" >&2
            exit 1
          fi
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; published assets are immutable." >&2
            exit 1
          fi
          gh release create "${GITHUB_REF_NAME}" \
            release/*.dmg \
            release/SHA256SUMS.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --latest \
            --title "AlgoLatch ${GITHUB_REF_NAME}" \
            --notes-file "${notes_file}"
