name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: macOS verification
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node 24 LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: Pin npm
        run: npm install --global npm@11.11.0

      - name: Install locked dependencies
        run: npm ci

      - name: Validate release configuration offline
        run: npm run accept:m9

      - name: Verify third-party notices
        run: npm run notices:check

      - name: Check formatting
        run: npm run format:check

      - name: Run unit, integration, and architecture tests
        run: npm test

      - name: Enforce M0-M5 gold, equivalence, and fuzz gates
        run: npm run accept:m0-m5-regression

      - name: Build production application
        run: npm run build

      - name: Run full historical and M6-M8 Electron regression
        id: electron_e2e
        run: npm run test:e2e

      - name: Upload Electron failure traces
        if: failure() && steps.electron_e2e.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: electron-e2e-failure-${{ github.sha }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/c-block-algorithm-panel-playwright
          if-no-files-found: ignore
          retention-days: 7

  verify_windows:
    name: Windows x64 package and installed-app gate
    runs-on: windows-2025
    timeout-minutes: 90
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node 24 LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: Pin npm
        run: npm install --global npm@11.11.0

      - name: Install locked dependencies
        run: npm ci

      - name: Type-check Windows code paths
        run: npm run typecheck

      - name: Test Windows toolchain, packaging, runner and install contracts
        run: >-
          npx vitest run
          tests/scripts/windows-toolchain.test.mjs
          tests/scripts/windows-release-credentials.test.mjs
          tests/scripts/installed-windows-gate.test.mjs
          tests/config/app-icon.test.ts
          tests/config/windows-packaging.test.ts
          tests/runner/process-host.test.ts
          tests/runner/trace-session.test.ts
          tests/app/runtime-workspace-controller.test.ts

      - name: Test the Windows Job Object runner contract
        run: >-
          npx vitest run tests/runner/runner.test.ts
          -t "uses the bundled Windows compiler through the Job Object host"

      - name: Build unsigned Windows x64 installer with locked llvm-mingw
        run: npm run dist:win:beta

      - name: Install, launch, exercise and uninstall the unsigned Beta
        run: npm run verify:installed-win:beta
