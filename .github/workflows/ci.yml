name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Node 24 verification
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node 24 LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: Pin npm
        run: npm install --global npm@11.11.0

      - name: Install locked dependencies
        run: npm ci

      - name: Validate release configuration offline
        run: npm run accept:m9

      - name: Verify third-party notices
        run: npm run notices:check

      - name: Check formatting
        run: npm run format:check

      - name: Run unit, integration, and architecture tests
        run: npm test

      - name: Enforce M0-M5 gold, equivalence, and fuzz gates
        run: npm run accept:m0-m5-regression

      - name: Build production application
        run: npm run build

      - name: Run full historical and M6-M8 Electron regression
        id: electron_e2e
        run: npm run test:e2e

      - name: Upload Electron failure traces
        if: failure() && steps.electron_e2e.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: electron-e2e-failure-${{ github.sha }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/c-block-algorithm-panel-playwright
          if-no-files-found: ignore
          retention-days: 7
